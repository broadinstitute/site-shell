<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Shell Demo</title>
  <script type="module" src="/dist/site-shell.js"></script>
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; font-family: Arial, sans-serif; }
    .demo-layout { display: flex; flex-direction: column; align-items: center;}
    .demo-content { flex: 1; padding: 50px; max-width: 1200px;}
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="demo-layout">
    <div class="demo-content">
      <h1>Site Shell v2 Demo</h1>
      <p>This is a consumer app. The shell renders into <code>#site-header</code> and <code>#site-footer</code>. This content area is never touched by the shell.</p>
    </div>
  </div>

  <div id="site-footer"></div>
</body>
</html>
